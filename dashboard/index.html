<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuraCoin Dashboard</title>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #7c6af7;
      --accent2:  #3de0c8;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --green:    #3de0a0;
      --red:      #f76a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent2); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Wallet Button */
    .wallet-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: var(--bg);
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    .wallet-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 1.2rem;
      color: var(--accent2);
      letter-spacing: 1px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      margin-bottom: 1.5rem;
    }

    .modal-body p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      padding: 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(124, 106, 247, 0.3);
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
    }

    .modal-footer button {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-footer .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--bg);
    }

    .modal-footer .btn-primary:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .modal-footer .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .modal-footer .btn-secondary:hover {
      background: var(--border);
      border-color: var(--muted);
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Price Chart Card */
    .price-chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .chart-title-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .chart-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent2);
      letter-spacing: 1px;
    }

    .chart-price {
      font-size: 2rem;
      font-weight: bold;
      color: var(--text);
    }

    .chart-price-change {
      font-size: 1rem;
      font-weight: bold;
      padding: 0.4rem 0.8rem;
