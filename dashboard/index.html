<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuraCoin Dashboard</title>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #7c6af7;
      --accent2:  #3de0c8;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --green:    #3de0a0;
      --red:      #f76a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent2); }
    
    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Wallet Button */
    .wallet-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: var(--bg);
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    .wallet-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 1.2rem;
      color: var(--accent2);
      letter-spacing: 1px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .wallet-info {
      margin-bottom: 1.5rem;
    }

    .wallet-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .wallet-address {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      font-size: 0.8rem;
      color: var(--accent2);
      word-break: break-all;
      font-family: monospace;
      margin-bottom: 1rem;
    }

    .balance-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .balance-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .balance-item:last-child {
      margin-bottom: 0;
    }

    .balance-name {
      font-size: 0.85rem;
      color: var(--text);
    }

    .balance-amount {
      font-size: 1rem;
      font-weight: bold;
      color: var(--green);
    }

    .disconnect-btn {
      width: 100%;
      background: var(--red);
      border: none;
      color: var(--text);
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: 'Courier New', monospace;
    }

    .disconnect-btn:hover {
      opacity: 0.8;
    }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    h2 {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }
    .stat-sub {
      font-size: 0.75rem;
      color: var(--green);
      margin-top: 0.25rem;
    }
