<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuraCoin Dashboard</title>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #7c6af7;
      --accent2:  #3de0c8;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --green:    #3de0a0;
      --red:      #f76a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent2); }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    h2 {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }
    .stat-sub {
      font-size: 0.75rem;
      color: var(--green);
      margin-top: 0.25rem;
    }

    /* Two column layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }

    /* Chart styles */
    .chart-container {
      position: relative;
      width: 100%;
      height: 300px;
      margin-top: 1rem;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .chart-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .price-current {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent2);
    }

    .price-change {
      font-size: 0.9rem;
      color: var(--green);
    }

    .price-change.negative {
      color: var(--red);
    }

    /* Jobs table */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .badge-success {
      background: rgba(61, 224, 160, 0.2);
      color: var(--green);
    }
    .badge-pending {
      background: rgba(124, 106, 247, 0.2);
      color: var(--accent);
    }
    .badge-error {
      background: rgba(247, 106, 106, 0.2);
      color: var(--red);
    }

    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">NEURA<span>COIN</span></div>
    <div class="nav-links">
      <a href="#dashboard">Dashboard</a>
      <a href="#compute">Compute</a>
      <a href="#earnings">Earnings</a>
      <a href="#docs">Docs</a>
    </div>
  </nav>

  <div class="container">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">NRC Price</div>
        <div class="stat-value" id="nrc-price">$2.84</div>
        <div class="stat-sub" id="nrc-change">+12.5% (24h)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Market Cap</div>
        <div class="stat-value">$284M</div>
        <div class="stat-sub">+8.2% (7d)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active GPUs</div>
        <div class="stat-value">4,230</div>
        <div class="stat-sub">+180 (24h)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Jobs Completed</div>
        <div class="stat-value">18,942</div>
        <div class="stat-sub">+2,341 (24h)</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid-2
