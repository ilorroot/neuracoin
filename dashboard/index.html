<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuraCoin Dashboard</title>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #7c6af7;
      --accent2:  #3de0c8;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --green:    #3de0a0;
      --red:      #f76a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent2); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Wallet Button */
    .wallet-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: var(--bg);
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    .wallet-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 1.2rem;
      color: var(--accent2);
      letter-spacing: 1px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .account-info {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .account-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .account-item label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .account-item .value {
      font-size: 1rem;
      font-weight: bold;
      color: var(--accent2);
    }

    .account-item .value.balance {
      color: var(--green);
    }

    .account-item .value.address {
      font-size: 0.7rem;
      word-break: break-all;
      font-family: monospace;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .modal-actions button {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--bg);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Main Content */
    .container {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--accent2);
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>

  <div class="modal" id="walletModal">
